services:
  db:
    image: postgres:15-alpine
    container_name: pokemon_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pokemon_password
      POSTGRES_DB: pokedex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: